<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Email Verification | Continental ID</title>
  <link rel="stylesheet" href="auth.css" />
</head>
<body class="auth-page">
  <main class="auth-single">
    <section class="auth-brand">
      <div class="auth-brand-logo" aria-hidden="true">
        <img src="C2.png" alt="" />
      </div>
      <p class="auth-eyebrow">Verification</p>
      <h1>Confirm your email.</h1>
      <p class="auth-brand-copy">Verify before you sign in.</p>
      <ul class="auth-brand-list" aria-label="Verification details">
        <li>Email confirmation</li>
        <li>Same login route</li>
        <li>Return to sign-in</li>
      </ul>
    </section>

    <section class="auth-panel">
      <div class="auth-panel-heading">
        <p class="auth-eyebrow">Email verification</p>
        <h2 id="heading">Checking link</h2>
        <p id="description" class="auth-panel-copy">Validating your verification token.</p>
      </div>

      <div id="status" class="status-banner" data-status="info" aria-live="polite" aria-atomic="true"></div>

      <div class="page-links">
        <a id="login-link" href="popup.html">Open login</a>
      </div>
    </section>
  </main>

  <script src="auth-config.js"></script>
  <script src="verify.js"></script>
</body>
</html>
